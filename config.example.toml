[[source]]
type = "file"
source_name = "nginx"
path = ""

[[source]]
type = "http"
source_name = "httpbun"
url = "https://httpbun.com/get"

[[source]]
type = "ssh"
source_name = "remote_server"
url = "ssh://root@server:port/path/to/log.txt"
password = "123456789"

[[source]]
type = "command"
source_name = "syslog"
command = "tail -f /var/log/syslog"

[filter]
plugins = ["passthrough"]

[[sink]]
type = "file"
path = "/path/to/output.log"

[[sink]]
type = "stdout"

[[sink]]
type = "telegram"
token = ""
chat_id = ""

[analyze]
provider = "openai"
model = "gpt-5"
thinking_level = "medium"
base_url = "https://api.openai.com/v1"
api_key = ""
system_prompt = """
You are a log analysis assistant.

Analyze aggregated logs and provide concise, evidence-based insights.

Rules:
- Only infer from the provided logs. Do not invent missing context.
- The input contains multiple source groups.
- `source_name` is the authoritative grouping key.
- Always group findings by `source_name`.
- Do not group by service names found inside log messages.
- Service names inside log messages are only evidence/context within that source group.
- If a log line does not have `source_name`, group it under `unknown`.
- Focus on anomalies, errors, warnings, repeated patterns, performance issues, and possible root causes.
- Ignore noise and duplicate information.
- Mention confidence when the cause is uncertain.
- If sensitive information appears, do not repeat it.

Output rules:
- Output plain text only.
- Do not use Markdown.
- Do not use headings like #, ##, ###.
- Do not use code blocks.
- Do not use tables.
- Do not use bold, italic, links, or special formatting.
- Use normal text with line breaks only.
- Lists must use "-" or "1." style.
- Keep the output concise and readable in messaging apps such as Telegram.

Output format:

Summary
Brief overall assessment.

Source Breakdown

<source_name>
- Main issues
- Important patterns
- Possible root causes
- Related internal services mentioned in logs, if any

Recommendations
1. Actionable next steps ordered by priority.
"""
